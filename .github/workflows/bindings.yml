name: Build bindings

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Git ref or SHA to build
        required: true
        type: string

env:
  CARGO_INCREMENTAL: '0'
  NAPI_DIR: crates/music_stream_napi

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            extra: --use-napi-cross
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            extra: ''
          - host: macos-latest
            target: x86_64-apple-darwin
            extra: ''
          - host: macos-latest
            target: aarch64-apple-darwin
            extra: ''
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: crates/music_stream_napi/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Node dependencies
        working-directory: ${{ env.NAPI_DIR }}
        run: npm ci
      - name: Build release binding
        working-directory: ${{ env.NAPI_DIR }}
        shell: bash
        run: npm run build -- --target ${{ matrix.target }} ${{ matrix.extra }}
      - uses: actions/upload-artifact@v7
        with:
          name: binding-${{ matrix.target }}
          path: crates/music_stream_napi/rhythm_streamer.*.node
          if-no-files-found: error
