name: Build bindings

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Git ref or SHA to build
        required: true
        type: string

env:
  CARGO_INCREMENTAL: '0'
  # audiopus_sys vendors an older Opus CMake project. New CMake releases require
  # the compatibility floor to be opted into explicitly.
  CMAKE_POLICY_VERSION_MINIMUM: '3.5'
  NAPI_DIR: crates/music_stream_napi

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref }}
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: crates/music_stream_napi/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Install Node dependencies
        working-directory: ${{ env.NAPI_DIR }}
        run: npm ci
      - name: Build release binding
        working-directory: ${{ env.NAPI_DIR }}
        shell: bash
        run: npm run build -- --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: binding-${{ matrix.target }}
          path: crates/music_stream_napi/rhythm_streamer.*.node
          if-no-files-found: error
