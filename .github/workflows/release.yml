name: Release

on:
  push:
    tags: ['v*.*.*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NAPI_DIR: crates/music_stream_napi

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            extra: --use-napi-cross
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            extra: ''
          - host: macos-latest
            target: x86_64-apple-darwin
            extra: ''
          - host: macos-latest
            target: aarch64-apple-darwin
            extra: ''
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: crates/music_stream_napi/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install dependencies
        working-directory: ${{ env.NAPI_DIR }}
        run: npm ci
      - name: Build release binding
        working-directory: ${{ env.NAPI_DIR }}
        shell: bash
        run: npm run build -- --target ${{ matrix.target }} ${{ matrix.extra }}
      - uses: actions/upload-artifact@v7
        with:
          name: binding-${{ matrix.target }}
          path: crates/music_stream_napi/rhythm_streamer.*.node
          if-no-files-found: error

  publish:
    name: Publish npm packages and GitHub release
    needs: build
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: crates/music_stream_napi/package-lock.json
      - name: Install npm with trusted publishing support
        run: npm install --global npm@11.17.0
      - name: Install dependencies
        working-directory: ${{ env.NAPI_DIR }}
        run: npm ci
      - name: Verify tag matches package version
        working-directory: ${{ env.NAPI_DIR }}
        shell: bash
        run: test "${GITHUB_REF_NAME}" = "v$(node -p "require('./package.json').version")"
      - name: Create platform package directories
        working-directory: ${{ env.NAPI_DIR }}
        run: npm run create:npm
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Assemble platform packages
        working-directory: ${{ env.NAPI_DIR }}
        run: npm run artifacts -- --output-dir ../../artifacts
      - name: Publish with npm OIDC provenance
        working-directory: ${{ env.NAPI_DIR }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_CONFIG_PROVENANCE: 'true'
          # Optional only for the one-time creation of packages before trusted publishers exist.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
