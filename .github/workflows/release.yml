name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build and publish
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NAPI_DIR: crates/music_stream_napi
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    uses: ./.github/workflows/bindings.yml
    with:
      checkout_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

  publish:
    name: Publish npm packages and GitHub release
    needs: build
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: crates/music_stream_napi/package-lock.json
      - name: Install npm with trusted publishing support
        run: npm install --global npm@11.17.0
      - name: Install dependencies
        working-directory: ${{ env.NAPI_DIR }}
        run: npm ci
      - name: Verify tag matches package version
        working-directory: ${{ env.NAPI_DIR }}
        shell: bash
        run: test "${RELEASE_TAG}" = "v$(node -p "require('./package.json').version")"
      - name: Create platform package directories
        working-directory: ${{ env.NAPI_DIR }}
        run: npm run create:npm
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Assemble platform packages
        working-directory: ${{ env.NAPI_DIR }}
        run: npm run artifacts -- --output-dir ../../artifacts
      - name: Publish with npm OIDC provenance
        working-directory: ${{ env.NAPI_DIR }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_CONFIG_PROVENANCE: 'true'
          # Optional only for the one-time creation of packages before trusted publishers exist.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
